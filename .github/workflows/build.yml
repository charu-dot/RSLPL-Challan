name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Fix invalid package name
        run: |
          # Tui jevabe likhechilis ota majhe majhe kaj kore na, eita sure-shot
          sed -i 's/^name:.*/name: rslpl_challan/' pubspec.yaml
          echo "Fixed pubspec.yaml:"
          head -5 pubspec.yaml

      - name: Create android folder if missing
        run: |
          if [! -d "android" ]; then
            flutter create --project-name rslpl_challan --platforms=android.
          else
            echo "android folder already exists, skipping create"
          fi

      - name: Fix Kotlin version
        run: |
          sed -i 's/ext.kotlin_version =.*/ext.kotlin_version = "1.9.22"/' android/build.gradle || true
          sed -i 's/kotlin_version =.*/kotlin_version = "1.9.22"/' android/settings.gradle || true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: RSLPL-Challan-APK
          path: build/app/outputs/flutter-apk/app-release.apk

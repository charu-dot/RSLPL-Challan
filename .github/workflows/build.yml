name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - run: flutter create --platforms=android --project-name rslpl_challan.
      - name: Fix Kotlin Duplicate Class Error
        run: |
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/" android/build.gradle || true
          echo "Applying Kotlin fix to app/build.gradle"
          printf "\nconfigurations {\n all {\n exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'\n exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'\n }\n}\n" >> android/app/build.gradle
          printf "\nsubprojects {\n project.configurations.all {\n resolutionStrategy.eachDependency { details ->\n if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.startsWith('kotlin-stdlib')) {\n details.useVersion \"1.8.10\"\n }\n }\n }\n}\n" >> android/build.gradle
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: RSLPL-Challan-APK
          path: build/app/outputs/flutter-apk/app-release.apk
